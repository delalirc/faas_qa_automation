[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require database/external services)
    e2e: End-to-end tests (require full stack)
    financial: Financial calculation tests
    smoke: Smoke tests (quick health checks)
    journey: Cross-service journey tests
    slow: Tests that take longer than 5 seconds

addopts =
    --strict-markers
    --tb=short
    -v
    --junitxml=test-results/junit.xml
    --html=test-results/report.html
    --self-contained-html

log_cli = true
log_cli_level = INFO

norecursedirs = .git .venv venv node_modules __pycache__ .pytest_cache
